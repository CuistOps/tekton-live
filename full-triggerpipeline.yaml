---
# ServiceAccount pour l'EventListener
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-triggers-sa

---
# ClusterRole : permissions pour l'EventListener
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-triggers-role
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create"]
  - apiGroups: ["triggers.tekton.dev"]
    resources:
      - triggerbindings
      - triggertemplates
      - triggers
      - eventlisteners
      - clustertriggerbindings
      - clusterinterceptors
      - interceptors
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-triggers-binding
subjects:
  - kind: ServiceAccount
    name: tekton-triggers-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-role

---
# Pipeline unique avec 2 tâches echo
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: echo-pipeline
spec:
  tasks:
    - name: echo-one
      taskSpec:
        steps:
          - name: echo
            image: alpine
            script: echo "Hello from task ONE"

    - name: echo-two
      runAfter: [echo-one]
      taskSpec:
        steps:
          - name: echo
            image: alpine
            script: echo "Hello from task TWO"

---
# TriggerBinding : extrait les données du payload webhook
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: webhook-binding
spec:
  params:
    - name: ref
      value: $(body.ref)

---
# TriggerTemplate : crée un PipelineRun
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: trigger-template
spec:
  params:
    - name: ref
      default: "unknown"
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: echo-pipeline-run-
      spec:
        pipelineRef:
          name: echo-pipeline

---
# EventListener : expose le webhook et déclenche le pipeline
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: webhook-listener
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: trigger-echo
      bindings:
        - ref: webhook-binding
      template:
        ref: trigger-template
